<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <title>{{ page.title | default: site.title }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>

<body>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand">
        <span class="nav-brand-mark">JV</span>
        <span class="nav-brand-name">Jake Vikoren</span>
      </a>

      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links" id="nav-links">
        <li><a href="{{ '/#about' | relative_url }}" {% if page.page_id=='home' %}class="active" {% endif %}>About</a>
        </li>
        <li><a href="{{ '/projects.html' | relative_url }}" {% if page.page_id=='projects' %}class="active" {% endif
            %}>Projects</a></li>
        <li><a href="{{ '/publications.html' | relative_url }}" {% if page.page_id=='publications' %}class="active" {%
            endif %}>Publications</a></li>
        <li><a href="{{ '/resume.html' | relative_url }}" {% if page.page_id=='resume' %}class="active" {% endif
            %}>Resume</a></li>
      </ul>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>&copy; {{ 'now' | date: "%Y" }} Jake Vikoren</p>
      <nav class="footer-links">
        <a href="https://github.com/jvikoren" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/jake-vikoren/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="{{ '/assets/files/Jake_Vikoren_CV.pdf' | relative_url }}" target="_blank" rel="noopener">CV</a>
      </nav>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>

</html>
